<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NexOps WS Test</title>
  <style>
    body { font-family: monospace; background: #0a0b0d; color: #e2e8f0; margin: 0; padding: 16px; }
    #status { padding: 6px 0; color: #f59e0b; }
    .rec { border-bottom: 1px solid #1a1d27; padding: 6px 0; font-size: 12px; white-space: pre-wrap; }
    /* NexOps risk colors */
    .risk-LOW      { color: #22c55e; }
    .risk-MEDIUM   { color: #eab308; }
    .risk-HIGH     { color: #f97316; }
    .risk-CRITICAL { color: #ef4444; font-weight: bold; }
    /* The "we caught it early" moment: NexOps risk above a Normal/Low gateway. */
    .early { background: #3b0d0d; border-left: 3px solid #ef4444; padding-left: 8px; }
    .early-tag { color: #fca5a5; font-weight: bold; }
    .warming { color: #64748b; }
    /* Engineer assignment */
    .assigned   { color: #38bdf8; font-weight: bold; }
    .unassigned { color: #64748b; }
  </style>
</head>
<body>
  <div id="status">connecting…</div>
  <div id="log"></div>
  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const ws = new WebSocket('ws://localhost:8000/ws');

    ws.onopen = () => { statusEl.textContent = 'CONNECTED · ws://localhost:8000/ws'; statusEl.style.color = '#22c55e'; };
    ws.onclose = () => { statusEl.textContent = 'DISCONNECTED'; statusEl.style.color = '#ef4444'; };
    ws.onerror = () => { statusEl.textContent = 'ERROR (is the backend running?)'; statusEl.style.color = '#ef4444'; };

    // Gateway priorities that count as "not alarmed" — if NexOps risk rises
    // above these, that's the early-catch moment we want to see.
    const GATEWAY_CALM = new Set(['low', 'normal', '', null, undefined]);
    const RISK_RANK = { LOW: 0, MEDIUM: 1, HIGH: 2, CRITICAL: 3 };

    ws.onmessage = (event) => {
      const rec = JSON.parse(event.data);
      const div = document.createElement('div');
      div.className = 'rec';

      // anomaly_score: number when scored, null while warming up.
      const scoreText = (rec.anomaly_status === 'scored' && rec.anomaly_score != null)
        ? rec.anomaly_score.toFixed(2)
        : '<span class="warming">warming up</span>';

      const risk = rec.nexops_risk || 'LOW';
      const gw = (rec.alarm_priority || '').toString().toLowerCase();

      // "Early catch": PREFER the backend's single-source-of-truth is_early flag
      // so this view shows the SAME EARLY as the React app (incl. the predictive
      // divergence cases the old priority-only formula missed). Fall back to the
      // old heuristic only for records that predate the field.
      const isEarly = (typeof rec.is_early === 'boolean')
        ? rec.is_early
        : (GATEWAY_CALM.has(gw) && (RISK_RANK[risk] || 0) >= 1);
      if (isEarly) div.classList.add('early');

      const earlyTag = isEarly ? ' <span class="early-tag">⚠ EARLY</span>' : '';
      const riskHtml = `<span class="risk-${risk}">${risk}</span>`;

      // Engineer assignment: faults get routed; Normal/LOW records stay Unassigned.
      const eng = rec.assigned_engineer || 'Unassigned';
      const cat = rec.fault_category;
      const assignedHtml = (eng && eng !== 'Unassigned')
        ? `<span class="assigned">→ assigned: ${eng}${cat ? ` (${cat})` : ''}</span>`
        : `<span class="unassigned">→ Unassigned</span>`;

      div.innerHTML =
        `${rec.Timestamp}  ${rec.Machine}  [${rec.Status}]  ${rec.Alert}  ` +
        `· gateway:${rec.alarm_priority || '—'}  · NexOps:${riskHtml} ` +
        `anomaly:${scoreText}${earlyTag}  ${assignedHtml}\n` +
        `    ${rec.nexops_reasoning || ''}  — ${rec.message || ''}` +
        `${rec.assignment_reason ? `\n    ↳ ${rec.assignment_reason}` : ''}`;

      logEl.prepend(div);
    };
  </script>
</body>
</html>
