<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NexOps WS Test</title>
  <style>
    body { font-family: monospace; background: #0a0b0d; color: #e2e8f0; margin: 0; padding: 16px; }
    #status { padding: 6px 0; color: #f59e0b; }
    .rec { border-bottom: 1px solid #1a1d27; padding: 6px 0; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="status">connecting…</div>
  <div id="log"></div>
  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const ws = new WebSocket('ws://localhost:8000/ws');

    ws.onopen = () => { statusEl.textContent = 'CONNECTED · ws://localhost:8000/ws'; statusEl.style.color = '#22c55e'; };
    ws.onclose = () => { statusEl.textContent = 'DISCONNECTED'; statusEl.style.color = '#ef4444'; };
    ws.onerror = () => { statusEl.textContent = 'ERROR (is the backend running?)'; statusEl.style.color = '#ef4444'; };

    ws.onmessage = (event) => {
      const rec = JSON.parse(event.data);
      const div = document.createElement('div');
      div.className = 'rec';
      div.textContent = `${rec.Timestamp}  ${rec.Machine}  [${rec.Status}]  ${rec.Alert} — ${rec.message}`;
      logEl.prepend(div);
    };
  </script>
</body>
</html>
